<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Cozysoft</title>
        <link rel="icon" type="image/png" href="icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bpmf+Iansui&family=Elms+Sans:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Bpmf Iansui", sans-serif;
                background-color: #2b2420;
                color: #e0d5c5;
                min-height: 100vh;
                margin: 0;
                display: flex;
                flex-direction: column;
            }

            .highlight {
                color: #a9743a;
            }

            .name {
                position: absolute;
                top: 0.1em;
                left: 50%;
                transform: translateX(-50%);
                margin: 0;
                text-align: center;
                font-size: 8em;
            }

            .subtext {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 100%;
                margin: 0;
                font-size: 4em;
                line-height: 2em;
                text-align: center;
            }

            .copyright {
                position: absolute;
                bottom: 0;
                left: 50%;
                transform: translateX(-50%);
                padding-bottom: 1.5em;
                font-size: 0.8em;
                text-align: center;
                opacity: 0.6;
            }
        </style>
    </head>
    <body>
        <p class="name">
            <span class="highlight">C</span>ozy<span class="highlight">s</span
            >oft
        </p>
        <p class="subtext">software<br />aligned with<br />human well-being</p>
        <footer class="copyright">© 2026 Cozysoft LLC</footer>
    </body>
</html>
